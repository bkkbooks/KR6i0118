  - {type: variant, offset: 1610, length: 97, content: 間差別之相，即是百福勝相、十地、十波羅蜜多、十三摩地、十二陀羅尼、六通、十自在、十力、四無所畏、四無礙解、十八不共法，大悲心等一切佛菩薩法，悉能任持具足。又復常持一切世出世間百千法蘊而悉成就，是為菩薩無量法雲含潤任持廣大法雨。, 宋: '', 元: '', 明: '', 宮: ''}
