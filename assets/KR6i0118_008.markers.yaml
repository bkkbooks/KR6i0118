  - {type: punctuation, offset: 1707, content: 「, id: KR6i0118_T_008-bkkpn251}
  - {type: variant, offset: 1707, length: 226, content: 善男子！云何是菩薩大法種種莊嚴樓閣布飾妙好？如世間風悉能普遍吹布一切莊嚴樓閣，種種安置殊妙可愛，及一切樹林枝葉牙莖華果蕊等，及一切有情身諸分位，悉由風力常所吹布。菩薩之風亦復如是，以無邊無礙無著解力辯才之智，悉能施設一切世出世間種種法門，行列具足照明開示最勝殊妙種種法者，所謂此相是惡趣所成之法，此是善趣所成之法，此是增上所成之法，此是地獄，此是餓鬼，此是畜生，此是人，此是天，此是轉輪聖王，此是帝釋、梵王、護世諸天，此是色相眷屬聰利福力，此是明慧善計，此是藝能，此是善解種種諸教典籍，此是聲聞乘法成聲聞果, 宋: '', 元: '', 明: '', 宮: ''}
