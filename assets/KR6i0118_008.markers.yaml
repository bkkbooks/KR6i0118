  - {type: variant, offset: 323, length: 322, content: 是故如來發起大悲；三者、一切法無壽者，而諸有情執以為有，是故如來發起大悲；四者、一切法無補特伽羅，而諸有情生其取著，是故如來發起大悲；五者、一切法無性，而諸有情起有性見，是故如來發起大悲；六者、一切法無礙，而諸有情著於所礙，是故如來發起大悲；七者、一切法無含藏，而諸有情生其樂著，是故如來發起大悲；八者、一切法無主宰，而諸有情著於我相，是故如來發起大悲；九者、一切法無攝屬，而諸有情起於執取，是故如來發起大悲；十者、一切法無物像，而諸有情著於境物，是故如來發起大悲；十一者、一切法無種姓，而諸有情生其取著，是故如來發起大悲；十二者、一切法無生無滅，而諸有情著於生滅，是故如來發起大悲；十三者、一切法無染污，而諸有情自生染污，是故如來發起大悲；十四者、一切法離貪，而諸有情生其貪愛，是故如來發起大悲；十五者、一切法離瞋，而諸有情生其瞋恚，是故如來發起, 宋: '', 元: '', 明: '', 宮: ''}
